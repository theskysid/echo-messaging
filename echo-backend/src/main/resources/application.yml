spring:
  output:
    ansi:
      enabled: always
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  # Email OTP — SMTP config
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}

# Twilio SMS config
twilio:
  account-sid: ${TWILIO_ACCOUNT_SID}
  auth-token: ${TWILIO_AUTH_TOKEN}
  phone-number: ${TWILIO_PHONE_NUMBER}

# Google OAuth2 config
google:
  client-id: ${GOOGLE_CLIENT_ID}

# OTP settings
otp:
  expiry-minutes: 5
  rate-limit:
    max-requests: 3
    window-minutes: 10

allowed-origins: ${ALLOWED_ORIGINS:https://echomessaging.duckdns.org,http://localhost:5173}

logging:
  pattern:
    console: "%clr(%d{HH:mm:ss}){faint} %clr(%-5level){green} %clr(%logger{18}){cyan} : %msg%n"

  level:
    org.hibernate: ERROR
    org.springframework.security: ERROR
    org.springframework.web: WARN
    org.springframework.messaging: WARN
    org.springframework.boot.autoconfigure: ERROR
    org.springframework.orm.jpa: ERROR

management:
  endpoint:
    web:
      exposure:
        include: health
    health:
      show-details: always