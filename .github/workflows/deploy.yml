name: Deploy Echo Messaging # name of your workflow

# This workflow triggers every time you push to main branch
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest # GitHub runs this on a temporary Ubuntu machine

    steps:
      # Step 1 - Checkout your code onto the temporary machine
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2 - Login to Docker Hub using your GitHub Secrets
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 3 - Build and push backend image to Docker Hub
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./echo-backend
          push: true
          tags: theskysid/echo-messaging-app:latest

      # Step 4 - Build and push frontend image to Docker Hub
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./echo-frontend
          push: true
          tags: theskysid/echo-messaging-frontend:latest
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}

      # Step 5 - SSH into your EC2 server and deploy
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Go to project directory
            cd ~/echo-messaging

            # Pull latest repository changes
            git pull origin main

            # Create production .env
            cat > .env << EOF
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}

            SPRING_DATASOURCE_URL=${{ secrets.SPRING_DATASOURCE_URL }}

            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRATION=${{ secrets.JWT_EXPIRATION }}

            ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS }}

            TWILIO_ACCOUNT_SID=${{ secrets.TWILIO_ACCOUNT_SID }}
            TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }}
            TWILIO_PHONE_NUMBER=${{ secrets.TWILIO_PHONE_NUMBER }}

            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}

            MAIL_HOST=${{ secrets.MAIL_HOST }}
            MAIL_PORT=${{ secrets.MAIL_PORT }}
            MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
            MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
            EOF

            # Pull latest Docker images
            docker compose pull

            # Restart containers
            docker compose up -d
            
            # Prune old unused Docker images
            docker image prune -af
            
            
            
