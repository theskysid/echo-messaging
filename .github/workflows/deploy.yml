name: Deploy Echo Messaging

on:
  push:
    branches:
      - main
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ==========================================
      # 🏗️ BUILD PHASE (Dynamic Tagging)
      # ==========================================

      #dynamically assign the tag: 'latest' for main, 'staging' for staging
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./echo-backend
          push: true
          tags: theskysid/echo-messaging-app:${{ github.ref == 'refs/heads/main' && 'latest' || 'staging' }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./echo-frontend
          push: true
          tags: theskysid/echo-messaging-frontend:${{ github.ref == 'refs/heads/main' && 'latest' || 'staging' }}
          build-args: |
            VITE_API_URL=${{ github.ref == 'refs/heads/main' && secrets.VITE_API_URL || secrets.STAGING_VITE_API_URL }}
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}

      # ==========================================
      # 🚀 DEPLOYMENT PHASE (Blast Radius Isolated)
      # ==========================================

      # --- 🧪 STAGING DEPLOYMENT ---
      - name: Deploy to EC2 (STAGING)
        if: github.ref == 'refs/heads/staging' # 🚦 Only runs if pushed to staging
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/echo-messaging
            git fetch origin
            git checkout staging
            git pull origin staging

            # 🔐 FINOPS: Create isolated Staging Environment file
            cat > .env.staging << EOF
            # === STRICTLY ISOLATED (Blast Radius) ===
            DB_NAME=${{ secrets.STAGING_DB_NAME }}
            DB_USER=${{ secrets.STAGING_DB_USER }}
            DB_PASSWORD=${{ secrets.STAGING_DB_PASSWORD }}
            SPRING_DATASOURCE_URL=${{ secrets.STAGING_SPRING_DATASOURCE_URL }}
            JWT_SECRET=${{ secrets.STAGING_JWT_SECRET }}
            
            # === SAFELY SHARED (Configuration & 3rd Party) ===
            JWT_EXPIRATION=${{ secrets.JWT_EXPIRATION }}
            ALLOWED_ORIGINS=*
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            TWILIO_ACCOUNT_SID=${{ secrets.TWILIO_ACCOUNT_SID }}
            TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }}
            TWILIO_PHONE_NUMBER=${{ secrets.TWILIO_PHONE_NUMBER }}
            MAIL_HOST=${{ secrets.MAIL_HOST }}
            MAIL_PORT=${{ secrets.MAIL_PORT }}
            MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
            MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
            EOF

            # 📦 Use the staging compose file
            docker compose -f docker-compose.staging.yml pull
            docker compose -f docker-compose.staging.yml up -d
            docker image prune -f

      # --- 🌍 PRODUCTION DEPLOYMENT ---
      - name: Deploy to EC2 (PRODUCTION)
        if: github.ref == 'refs/heads/main' # 🚦 Only runs if pushed to main
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/echo-messaging
            git fetch origin
            git checkout main
            git pull origin main

            # 🔐 Production Environment file
            cat > .env << EOF
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            SPRING_DATASOURCE_URL=${{ secrets.SPRING_DATASOURCE_URL }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRATION=${{ secrets.JWT_EXPIRATION }}
            ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS }}
            TWILIO_ACCOUNT_SID=${{ secrets.TWILIO_ACCOUNT_SID }}
            TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }}
            TWILIO_PHONE_NUMBER=${{ secrets.TWILIO_PHONE_NUMBER }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            MAIL_HOST=${{ secrets.MAIL_HOST }}
            MAIL_PORT=${{ secrets.MAIL_PORT }}
            MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
            MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
            EOF

            # 📦 Use the production compose file
            docker compose -f docker-compose.yml pull
            docker compose -f docker-compose.yml up -d
            docker image prune -f