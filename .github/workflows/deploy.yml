name: Deploy Echo Messaging # name of your workflow

# This workflow triggers every time you push to main branch
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest # GitHub runs this on a temporary Ubuntu machine

    steps:
      # Step 1 - Checkout your code onto the temporary machine
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2 - Login to Docker Hub using your GitHub Secrets
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 3 - Build and push backend image to Docker Hub
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./echo-backend
          push: true
          tags: theskysid/echo-messaging-app:latest

      # Step 4 - Build and push frontend image to Docker Hub
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./echo-frontend
          push: true
          tags: theskysid/echo-messaging-frontend:latest
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}

      # Step 5 - SSH into your EC2 server and deploy
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~
            cat > .env << EOF
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            SPRING_DATASOURCE_URL=${{ secrets.SPRING_DATASOURCE_URL }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRATION=${{ secrets.JWT_EXPIRATION }}
            EOF
            cat > docker-compose.yml << 'EOF'
            volumes:
              postgres_data:

            services:
              postgres:
                image: postgres:16
                environment:
                  POSTGRES_DB: ${DB_NAME}
                  POSTGRES_USER: ${DB_USER}
                  POSTGRES_PASSWORD: ${DB_PASSWORD}
                ports:
                  - "5433:5432"
                volumes:
                  - postgres_data:/var/lib/postgresql/data
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
                  interval: 5s
                  retries: 5
              app:
                image: theskysid/echo-messaging-app:latest
                ports:
                  - "8080:8080"
                depends_on:
                  postgres:
                    condition: service_healthy
                environment:
                  SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
                  SPRING_DATASOURCE_USERNAME: ${DB_USER}
                  SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
                  JWT_SECRET: ${JWT_SECRET}
                  JWT_EXPIRATION: ${JWT_EXPIRATION}
              frontend:
                image: theskysid/echo-messaging-frontend:latest
                ports:
                  - "5173:80"
                depends_on:
                  - app
            EOF
            docker pull theskysid/echo-messaging-app:latest
            docker pull theskysid/echo-messaging-frontend:latest
            docker-compose down
            docker-compose up -d
