volumes:
  postgres_data:

services:
  postgres:
    image: postgres:16
    container_name: echo-postgres
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${DB_USER} -d $${DB_NAME}"]
      interval: 5s
      retries: 5
      timeout: 5s

  app:
    image: theskysid/echo-messaging-app:latest
    container_name: echo-backend
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  frontend:
    image: theskysid/echo-messaging-frontend:latest
    container_name: echo-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - app